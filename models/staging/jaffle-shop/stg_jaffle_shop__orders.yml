version: 2
 
models:
  - name: stg_jaffle_shop__orders
    description: Staging model for orders from Jaffle Shop. One row per order.
    columns:
      - name: order_id
        description: Primary key of the orders table.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers. Customer who placed the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_placed_at
        description: Date when the order was placed.
        tests:
          - not_null

      - name: order_status
        description: Status of the order. "{{ doc('order_status_accepted_values')}}"
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']